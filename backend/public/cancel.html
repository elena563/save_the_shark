<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Donation Cancelled - Save the Sharks</title>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Fira+Sans:ital,wght@0,400;0,500;0,600;0,700;1,500;1,600;1,700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        h1, h2, h3, h4, h5{
            font-family: 'Rubik', sans-serif;
        }
        p, li, a, form span, form{
            font-family: 'Fira Sans', Arial, sans-serif;
            text-decoration: none;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            padding: 60px 40px;
            max-width: 600px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        
        .cancel-icon {
            width: 80px;
            height: 80px;
            background: #ef4444;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
            animation: scaleIn 0.5s ease-out;
        }
        
        .cancel-icon svg {
            width: 50px;
            height: 50px;
            stroke: white;
            stroke-width: 3;
            fill: none;
        }
        
        h1 {
            color: #1f2937;
            font-size: 2.5em;
            margin-bottom: 20px;
        }
        
        p {
            color: #6b7280;
            font-size: 1.1em;
            line-height: 1.6;
            margin-bottom: 20px;
        }
        
        .buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 30px;
        }
        
        .botn {
            padding: 12px 16px;
            border: none;
            text-decoration: none;
            outline: none;
            border-radius: 6px;
            font-size: 17px;
            font-weight: bold;
            cursor: pointer;
            transition: .5s;
            min-width: 150px;
        }
        
        .botn-primary {
            background: #62B0FE;
            color: #fff;
        }
        
        .botn-primary:hover {
            text-decoration: none;
            background-color: #4398ed;
        }
        
        .botn-secondary {
            background: #e5e7eb;
            color: #1f2937;
        }
        
        .botn-secondary:hover {
            text-decoration: none;
            background-color: #d1d5db;
        }
        
        @keyframes scaleIn {
            from {
                transform: scale(0);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="cancel-icon">
            <svg viewBox="0 0 52 52">
                <line x1="16" y1="16" x2="36" y2="36"/>
                <line x1="36" y1="16" x2="16" y2="36"/>
            </svg>
        </div>
        
        <h1>Donation Cancelled</h1>
        
        <p>
            Your donation was cancelled and no charges were made to your card.
        </p>
        
        <p>
            We understand that circumstances change. If you'd like to support 
            our mission in the future, we'll be here whenever you're ready.
        </p>
        
        <div class="buttons">
            <a href="/donate" id="tryAgainLink" class="botn botn-primary">Try Again</a>
            <a href="/" id="homeLink" class="botn botn-secondary">Return to Homepage</a>
        </div>
    </div>

    <script>
        // Fetch frontend URL from backend config
        fetch('/api/config')
            .then(response => response.json())
            .then(data => {
                document.getElementById('tryAgainLink').href = data.frontendUrl + '/donate';
                document.getElementById('homeLink').href = data.frontendUrl + '/';
            })
            .catch(error => {
                console.error('Error loading config:', error);
                // Fallback to root if config fails
                document.getElementById('tryAgainLink').href = '/donate';
                document.getElementById('homeLink').href = '/';
            });
    </script>
</body>
</html>
