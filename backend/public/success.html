<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Donation Successful - Save the Sharks</title>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Fira+Sans:ital,wght@0,400;0,500;0,600;0,700;1,500;1,600;1,700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #62B0FE 0%, #4398ed 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        h1, h2, h3, h4, h5{
            font-family: 'Rubik', sans-serif;
        }
        p, li, a, form span, form{
            font-family: 'Fira Sans', Arial, sans-serif;
            text-decoration: none;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            padding: 60px 40px;
            max-width: 600px;
            text-align: center;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }
        
        .success-icon {
            width: 80px;
            height: 80px;
            background: #10b981;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
            animation: scaleIn 0.5s ease-out;
        }
        
        .success-icon svg {
            width: 50px;
            height: 50px;
            stroke: white;
            stroke-width: 3;
            fill: none;
        }
        
        h1 {
            color: #1f2937;
            font-size: 2.5em;
            margin-bottom: 20px;
        }
        
        p {
            color: #6b7280;
            font-size: 1.1em;
            line-height: 1.6;
            margin-bottom: 30px;
        }
        
        .botn {
            width: 100%;
            padding: 12px 16px;
            background: #62B0FE;
            border: none;
            text-decoration: none;
            outline: none;
            border-radius: 6px;
            font-size: 17px;
            color: #fff;
            margin-top: 5px;
            font-weight: bold;
            cursor: pointer;
            transition: .5s;
        }
        
        .botn:hover{
            text-decoration: none;
            background-color: #4398ed;
            cursor: pointer;
        }
        
        @keyframes scaleIn {
            from {
                transform: scale(0);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="success-icon">
            <svg viewBox="0 0 52 52">
                <polyline points="14 27 22.5 35.5 38 20"/>
            </svg>
        </div>
        
        <h1>Thank You! 🦈</h1>
        
        <p>
            Your generous donation has been successfully processed. 
            Thanks to supporters like you, we can continue our mission 
            to protect sharks and preserve our oceans for future generations.
        </p>
        
        <p>
            You will receive a confirmation email shortly with your donation details.
        </p>
        
        <a href="/" id="homeLink" class="botn">Return to Homepage</a>
    </div>

    <script>
        // Fetch frontend URL from backend config
        fetch('/api/config')
            .then(response => response.json())
            .then(data => {
                document.getElementById('homeLink').href = data.frontendUrl + '/';
            })
            .catch(error => {
                console.error('Error loading config:', error);
                // Fallback to root if config fails
                document.getElementById('homeLink').href = '/';
            });
    </script>
</body>
</html>
